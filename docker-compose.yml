services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-wanosc_db}
      POSTGRES_USER: ${DB_USER:-wanosc_user}
      POSTGRES_PASSWORD: ${DB_PASS:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wanosc_user} -d ${DB_NAME:-wanosc_db}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+psycopg2://${DB_USER:-wanosc_user}:${DB_PASS:-changeme}@db:5432/${DB_NAME:-wanosc_db}"
      JWT_SECRET: "${JWT_SECRET:-please_change_this_secret}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        # Empty => frontend uses relative "/api", proxied by this container's Nginx.
        REACT_APP_BACKEND_URL: ""
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  pgdata:
