# WANOSC-Toolbox — Nginx site config
# Save as /etc/nginx/sites-available/wanosc, then:
#   sudo ln -s /etc/nginx/sites-available/wanosc /etc/nginx/sites-enabled/wanosc
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;   # <-- change to your domain or server IP

    # Max upload size — allows up to 200 Word files in one request.
    client_max_body_size 512M;

    # --- React frontend (static build output) ---
    root /opt/wanosc/frontend/build;   # <-- path to `npm run build` output
    index index.html;

    # --- API -> FastAPI (uvicorn/gunicorn on 127.0.0.1:8001) ---
    # NOTE: the trailing behaviour keeps the /api prefix, which the backend expects.
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    # --- SPA fallback: serve index.html for client-side routes ---
    location / {
        try_files $uri /index.html;
    }
}

# ------------------------------------------------------------------
# HTTPS: after the above works on port 80, run:
#   sudo apt install certbot python3-certbot-nginx -y
#   sudo certbot --nginx -d your-domain.com
# Certbot will automatically add the SSL server block and redirect.
# ------------------------------------------------------------------
